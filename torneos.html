<!DOCTYPE html>
<html lang="es">
<head>
  <!-- BUTA TCG · sitio original · build BTCG-2026-aabb1727 · butatcg en Instagram -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torneos — BUTA TCG</title>
  <meta name="description" content="Próximo torneo de Yu-Gi-Oh! TCG de BUTA en Córdoba: fecha, lugar, formato, premios e inscripción online." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="BUTA TCG" />
  <meta property="og:title" content="Torneos — BUTA TCG" />
  <meta property="og:description" content="Próximo torneo de Yu-Gi-Oh! TCG de BUTA en Córdoba: fecha, lugar, formato, premios e inscripción online." />
  <meta property="og:url" content="https://l4gash.github.io/buta-tcg-web/torneos.html" />
  <meta property="og:image" content="https://l4gash.github.io/buta-tcg-web/assets/logo-butatcg.png" />
  <meta property="og:locale" content="es_AR" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" type="image/png" href="assets/logo-butatcg.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#05060f" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,600;0,700;1,600;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tailwind.css" />
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="min-h-screen bg-noche font-body text-white antialiased">

  <script type="module" src="js/layout.js"></script>

  <header id="site-header" class="sticky top-0 z-40 border-b border-borde/60 bg-noche/80 backdrop-blur-md"></header>

  <main class="mx-auto max-w-6xl px-4">

    <section class="pb-4 pt-12 text-center">
      <p class="font-display text-xs font-semibold uppercase tracking-[0.3em] text-violeta-glow">Próximo torneo</p>
      <h1 class="texto-neon mt-3 font-display text-3xl font-bold italic text-white sm:text-5xl" style="letter-spacing:-0.03em;">Prepará tu mejor deck</h1>
    </section>

    <!-- TORNEOS ACTIVOS (poblado por JS) -->
    <section id="seccion-torneos" aria-label="Torneos activos" class="py-8">
      <div id="lista-torneos" class="grid gap-5 md:grid-cols-2 lg:grid-cols-3">
        <div class="skeleton h-64 w-full md:col-span-2 lg:col-span-3"></div>
      </div>
    </section>

    <!-- INSCRIPCIÓN -->
    <section id="seccion-inscripcion" class="py-8">
      <div class="mx-auto max-w-3xl rounded-2xl border border-borde bg-tinta/70 p-6 shadow-card sm:p-8">
        <h2 class="font-display text-2xl font-bold italic text-white" style="letter-spacing:-0.03em;">Inscripción</h2>
        <form id="form-inscripcion" class="mt-6 flex flex-col gap-5" novalidate>
          <div>
            <label for="torneo-select" class="font-body text-sm font-semibold text-humo">Torneo</label>
            <select id="torneo-select" name="torneo" required
              class="mt-1.5 w-full rounded-lg border border-borde bg-noche px-4 py-3 font-body text-white focus:border-primario"></select>
          </div>
          <div>
            <label for="nombre" class="font-body text-sm font-semibold text-humo">Nombre completo</label>
            <input id="nombre" name="nombre" type="text" autocomplete="name" required aria-describedby="error-nombre" aria-invalid="false"
              class="mt-1.5 w-full rounded-lg border border-borde bg-noche px-4 py-3 font-body text-white placeholder-humo/80 focus:border-primario"
              placeholder="Ej: Yugi Muto" />
            <p id="error-nombre" data-error-for="nombre" role="alert" class="mt-1.5 hidden font-body text-sm text-red-400">Ingresá tu nombre completo (mínimo 3 letras).</p>
          </div>
          <div>
            <label for="konami-id" class="font-body text-sm font-semibold text-humo">Konami ID (10 dígitos)</label>
            <input id="konami-id" name="konami_id" type="text" inputmode="numeric" maxlength="10" required aria-describedby="error-konami-id" aria-invalid="false"
              class="mt-1.5 w-full rounded-lg border border-borde bg-noche px-4 py-3 font-body text-white placeholder-humo/80 focus:border-primario"
              placeholder="Ej: 0123456789" />
            <p id="error-konami-id" data-error-for="konami-id" role="alert" class="mt-1.5 hidden font-body text-sm text-red-400">El Konami ID son exactamente 10 números (figura en tu tarjeta de Konami).</p>
          </div>
          <div>
            <label for="comentario" class="font-body text-sm font-semibold text-humo">Comentario <span class="font-normal text-humo">(opcional)</span></label>
            <textarea id="comentario" name="comentario" maxlength="100" rows="2"
              class="mt-1.5 w-full resize-none rounded-lg border border-borde bg-noche px-4 py-3 font-body text-white placeholder-humo/80 focus:border-primario"
              placeholder="Ej: ya transferí / pago en efectivo el día del torneo"></textarea>
            <p id="contador-comentario" class="mt-1 text-right font-body text-xs text-humo" aria-hidden="true">0/100</p>
          </div>
          <div>
            <label for="comprobante" class="font-body text-sm font-semibold text-humo">Comprobante de pago <span class="font-normal text-humo">(opcional)</span></label>
            <input id="comprobante" name="comprobante" type="file" accept="image/jpeg,image/png,image/webp"
              aria-describedby="comprobante-error" aria-invalid="false"
              class="mt-1.5 block w-full cursor-pointer rounded-lg border border-borde bg-noche px-4 py-3 font-body text-sm text-humo file:mr-3 file:cursor-pointer file:rounded-full file:border-0 file:bg-primario file:px-4 file:py-1.5 file:font-display file:text-xs file:font-semibold file:text-white hover:file:opacity-90 focus:border-primario" />
            <div id="comprobante-preview" class="mt-2 hidden items-center gap-3 rounded-lg border border-borde bg-noche/60 p-2">
              <img id="comprobante-thumb" alt="Vista previa del comprobante" class="h-12 w-12 rounded object-cover" />
              <span id="comprobante-nombre" class="min-w-0 flex-1 truncate font-body text-xs text-humo"></span>
              <button type="button" id="comprobante-quitar" class="shrink-0 rounded-full border border-borde px-3 py-1 font-body text-xs text-humo hover:border-primario hover:text-white">Quitar</button>
            </div>
            <p id="comprobante-nota" class="mt-1.5 font-body text-xs leading-[1.6] text-humo">Opcional. Si transferiste, adjuntá la captura acá o envianos el comprobante por WhatsApp al organizador.</p>
            <p id="comprobante-error" data-error-for="comprobante" role="alert" class="mt-1.5 hidden font-body text-sm text-red-400"></p>
          </div>
          <button type="submit" id="btn-inscribir"
            class="rounded-full bg-gradient-to-r from-primario to-violeta px-8 py-3.5 font-display font-bold italic text-white shadow-glow-azul hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-50">
            Confirmar inscripción
          </button>
          <p id="mensaje-resultado" role="status" aria-live="polite" class="hidden rounded-lg px-4 py-3 font-body text-sm"></p>
        </form>
      </div>
    </section>

  </main>

  <footer id="site-footer" class="mt-20 border-t border-borde/60 py-10"></footer>

  <script type="module" src="js/inscripcion.js"></script>

</body>
</html>
