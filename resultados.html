<!DOCTYPE html>
<html lang="es">
<head>
  <!-- BUTA TCG · sitio original · build BTCG-2026-aabb1727 · butatcg en Instagram -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultados — BUTA TCG</title>
  <meta name="description" content="Resultados de los torneos de Yu-Gi-Oh! TCG de BUTA: ganadores, top 8 y decklists de cada fecha." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="BUTA TCG" />
  <meta property="og:title" content="Resultados — BUTA TCG" />
  <meta property="og:description" content="Resultados de los torneos de Yu-Gi-Oh! TCG de BUTA: ganadores, top 8 y decklists de cada fecha." />
  <meta property="og:url" content="https://l4gash.github.io/buta-tcg-web/resultados.html" />
  <meta property="og:image" content="https://l4gash.github.io/buta-tcg-web/assets/logo-butatcg.png" />
  <meta property="og:locale" content="es_AR" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" type="image/png" href="assets/logo-butatcg.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,600;0,700;1,600;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tailwind.css" />
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="min-h-screen bg-noche font-body text-white antialiased">

  <script type="module" src="js/layout.js"></script>

  <header id="site-header" class="sticky top-0 z-40 border-b border-borde/60 bg-noche/80 backdrop-blur-md"></header>

  <main class="mx-auto max-w-6xl px-4">

    <section class="pb-4 pt-12 text-center">
      <p class="font-display text-xs font-semibold uppercase tracking-[0.3em] text-violeta-glow">Salón de la fama</p>
      <h1 class="texto-neon mt-3 font-display text-3xl font-bold italic text-white sm:text-5xl" style="letter-spacing:-0.03em;">Resultados de torneos</h1>
      <div class="mt-8 flex justify-center">
        <select id="selector-torneo" aria-label="Elegir torneo"
          class="rounded-lg border border-borde bg-tinta px-4 py-2.5 font-body text-white focus:border-primario"></select>
      </div>
    </section>

    <section id="podio" class="py-8"><div class="skeleton h-72 w-full"></div></section>
    <section id="grilla-top" class="py-4"></section>

    <!-- META DE DECKS (poblado por JS con todos los resultados de la temporada) -->
    <section id="meta-decks" aria-labelledby="meta-titulo" class="py-10" hidden>
      <h2 id="meta-titulo" class="font-display text-2xl font-bold italic text-white" style="letter-spacing:-0.03em;">El meta de Córdoba</h2>
      <p class="mt-2 font-body text-sm leading-[1.7] text-humo">Decks en los tops de todas las fechas de la temporada.</p>
      <div id="meta-barras" class="mt-5"></div>
    </section>

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 z-50 hidden items-center justify-center bg-noche/95 p-4" role="dialog" aria-modal="true" aria-label="Foto ampliada" tabindex="-1">
      <button id="cerrar-lightbox" class="absolute right-4 top-4 rounded-full border border-borde bg-tinta px-4 py-2 font-body text-sm text-white hover:border-primario" aria-label="Cerrar">✕ Cerrar</button>
      <img id="lightbox-img" alt="" class="max-h-[90vh] max-w-full rounded-xl object-contain" />
    </div>

  </main>

  <footer id="site-footer" class="mt-20 border-t border-borde/60 py-10"></footer>

  <script type="module" src="js/resultados.js"></script>

</body>
</html>
